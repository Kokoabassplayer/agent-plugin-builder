<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Universal plugin creation flow</title>
  <desc id="desc">Agent Plugin Builder installs as one skill core, then produces adapters, installers, docs, tests, and funding-ready plugin repos for multiple AI harnesses.</desc>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffdf6e"/>
      <stop offset="1" stop-color="#f36d38"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171b22"/>
      <stop offset="1" stop-color="#0c1117"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="32" stdDeviation="32" flood-color="#06070a" flood-opacity="0.38"/>
    </filter>
    <pattern id="grid" width="128" height="128" patternUnits="userSpaceOnUse">
      <path d="M128 0H0V128" fill="none" stroke="#f7f3eb" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1536" height="1024" fill="#06070a"/>
  <rect x="96" y="76" width="1344" height="872" rx="52" fill="#080b10" stroke="#f7f3eb" stroke-opacity="0.08"/>
  <rect x="96" y="76" width="1344" height="872" rx="52" fill="url(#grid)"/>
  <circle cx="205" cy="174" r="210" fill="#ffdf6e" opacity="0.07"/>
  <circle cx="1308" cy="842" r="260" fill="#f36d38" opacity="0.08"/>

  <g stroke="#ffdf6e" stroke-width="3" stroke-linecap="round" opacity="0.58">
    <path d="M768 286V210"/>
    <path d="M402 504H302"/>
    <path d="M1134 504H1234"/>
    <path d="M768 696V794"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="402" y="286" width="732" height="410" rx="42" fill="url(#panel)" stroke="#ffdf6e" stroke-opacity="0.42" stroke-width="2"/>
    <rect x="450" y="338" width="636" height="84" rx="22" fill="url(#accent)"/>
    <text x="768" y="392" text-anchor="middle" fill="#141006" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="40" font-weight="850">Agent Plugin Builder</text>
    <text x="768" y="490" text-anchor="middle" fill="#f7f3eb" font-family="Cascadia Mono, Consolas, monospace" font-size="28" font-weight="750">skills/agent-plugin-builder</text>
    <text x="768" y="552" text-anchor="middle" fill="#c9c4b8" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="30" font-weight="650">one portable skill core</text>
    <text x="768" y="604" text-anchor="middle" fill="#9f9b91" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="28">creates installable plugin repos</text>
  </g>

  <g font-family="Aptos, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g>
      <rect x="548" y="118" width="440" height="132" rx="30" fill="#151921" stroke="#292d35"/>
      <text x="768" y="178" text-anchor="middle" fill="#f7f3eb" font-size="28" font-weight="800">Install builder skill</text>
      <text x="768" y="216" text-anchor="middle" fill="#a5a39e" font-size="21" font-family="Cascadia Mono, Consolas, monospace">npx ... install --target codex</text>
    </g>
    <g>
      <rect x="142" y="418" width="296" height="172" rx="30" fill="#151921" stroke="#292d35"/>
      <text x="290" y="489" text-anchor="middle" fill="#f7f3eb" font-size="28" font-weight="800">Skill core</text>
      <text x="290" y="528" text-anchor="middle" fill="#a5a39e" font-size="21">SKILL.md plus references</text>
    </g>
    <g>
      <rect x="1098" y="418" width="296" height="172" rx="30" fill="#151921" stroke="#292d35"/>
      <text x="1246" y="489" text-anchor="middle" fill="#f7f3eb" font-size="28" font-weight="800">Adapters</text>
      <text x="1246" y="528" text-anchor="middle" fill="#a5a39e" font-size="21">Codex, Claude, Gemini</text>
    </g>
    <g>
      <rect x="512" y="778" width="512" height="136" rx="30" fill="#151921" stroke="#292d35"/>
      <text x="768" y="838" text-anchor="middle" fill="#f7f3eb" font-size="28" font-weight="800">Generated plugin repo</text>
      <text x="768" y="878" text-anchor="middle" fill="#a5a39e" font-size="21">docs, tests, installers, funding</text>
    </g>
  </g>
</svg>
