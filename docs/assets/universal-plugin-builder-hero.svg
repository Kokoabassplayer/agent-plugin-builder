<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Universal plugin creation flow</title>
  <desc id="desc">Agent Plugin Builder creates one Agent Skill core, then packages adapters, installers, docs, and tests for multiple AI harnesses.</desc>
  <rect width="1536" height="1024" fill="#06070a"/>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffdf6e"/>
      <stop offset="1" stop-color="#f36d38"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#06070a" flood-opacity="0.38"/>
    </filter>
  </defs>
  <g opacity="0.18">
    <path d="M0 174H1536M0 344H1536M0 514H1536M0 684H1536M0 854H1536M192 0V1024M384 0V1024M576 0V1024M768 0V1024M960 0V1024M1152 0V1024M1344 0V1024" stroke="#f7f3eb" stroke-width="1"/>
  </g>
  <circle cx="258" cy="160" r="210" fill="#ffdf6e" opacity="0.12"/>
  <circle cx="1278" cy="828" r="260" fill="#f36d38" opacity="0.12"/>

  <g filter="url(#soft)">
    <rect x="520" y="322" width="496" height="302" rx="36" fill="#101216" stroke="#ffdf6e" stroke-opacity="0.58" stroke-width="2"/>
    <rect x="558" y="360" width="420" height="72" rx="18" fill="url(#accent)"/>
    <text x="768" y="404" text-anchor="middle" fill="#141006" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">Agent Plugin Builder</text>
    <text x="768" y="482" text-anchor="middle" fill="#f7f3eb" font-family="Cascadia Mono, Consolas, monospace" font-size="24" font-weight="700">skills/agent-plugin-builder</text>
    <text x="768" y="529" text-anchor="middle" fill="#a5a39e" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="26">one portable skill core</text>
    <text x="768" y="574" text-anchor="middle" fill="#a5a39e" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="26">generates installable plugin repos</text>
  </g>

  <g stroke="#ffdf6e" stroke-width="3" stroke-linecap="round" opacity="0.88">
    <path d="M520 474H278"/>
    <path d="M1016 474H1258"/>
    <path d="M768 322V182"/>
    <path d="M768 624V842"/>
    <path d="M608 624L376 790"/>
    <path d="M928 624L1160 790"/>
  </g>

  <g font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="25" font-weight="800" fill="#f7f3eb">
    <g>
      <rect x="92" y="392" width="284" height="164" rx="28" fill="#171a20" stroke="#292d35"/>
      <text x="234" y="462" text-anchor="middle">SKILL.md</text>
      <text x="234" y="506" text-anchor="middle" fill="#a5a39e" font-size="20" font-weight="500">instructions first</text>
    </g>
    <g>
      <rect x="1160" y="392" width="284" height="164" rx="28" fill="#171a20" stroke="#292d35"/>
      <text x="1302" y="462" text-anchor="middle">adapters</text>
      <text x="1302" y="506" text-anchor="middle" fill="#a5a39e" font-size="20" font-weight="500">Codex, Claude, Gemini</text>
    </g>
    <g>
      <rect x="602" y="72" width="332" height="132" rx="28" fill="#171a20" stroke="#292d35"/>
      <text x="768" y="132" text-anchor="middle">installer</text>
      <text x="768" y="170" text-anchor="middle" fill="#a5a39e" font-size="20" font-weight="500">npx install target</text>
    </g>
    <g>
      <rect x="602" y="806" width="332" height="132" rx="28" fill="#171a20" stroke="#292d35"/>
      <text x="768" y="866" text-anchor="middle">tests</text>
      <text x="768" y="904" text-anchor="middle" fill="#a5a39e" font-size="20" font-weight="500">verify scaffold works</text>
    </g>
    <g>
      <rect x="232" y="736" width="288" height="132" rx="28" fill="#171a20" stroke="#292d35"/>
      <text x="376" y="796" text-anchor="middle">docs</text>
      <text x="376" y="834" text-anchor="middle" fill="#a5a39e" font-size="20" font-weight="500">GitHub Pages ready</text>
    </g>
    <g>
      <rect x="1016" y="736" width="288" height="132" rx="28" fill="#171a20" stroke="#292d35"/>
      <text x="1160" y="796" text-anchor="middle">funding</text>
      <text x="1160" y="834" text-anchor="middle" fill="#a5a39e" font-size="20" font-weight="500">Sponsors enabled</text>
    </g>
  </g>
</svg>